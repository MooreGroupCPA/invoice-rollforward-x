<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Invoice Rollforward X</title>

  <style>
    :root{
      --bg0:#050816;
      --bg1:#0b122a;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.10);
      --line: rgba(255,255,255,.14);
      --text:#e5e7eb;
      --muted: rgba(229,231,235,.72);
      --glow: 0 0 18px rgba(59,130,246,.55), 0 0 44px rgba(168,85,247,.18);
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius: 22px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      min-height:100vh;
      background:
        radial-gradient(1200px 600px at 15% 10%, rgba(59,130,246,.25), transparent 55%),
        radial-gradient(900px 520px at 85% 25%, rgba(168,85,247,.22), transparent 60%),
        radial-gradient(700px 500px at 50% 95%, rgba(34,197,94,.12), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed; inset:0;
      background:
        linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px) 0 0 / 44px 44px,
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px) 0 0 / 44px 44px;
      opacity:.12;
      animation: drift 18s linear infinite;
      pointer-events:none;
    }
    @keyframes drift{
      from { background-position: 0 0, 0 0; }
      to   { background-position: 220px 220px, 220px 220px; }
    }

    .wrap{
      width:min(860px, 92vw);
      margin: 44px auto;
      padding: 26px;
    }

    .card{
      position:relative;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      backdrop-filter: blur(14px);
    }

    .card::before{
      content:"";
      position:absolute; inset:-2px;
      background: conic-gradient(
        from 120deg,
        rgba(59,130,246,.0),
        rgba(59,130,246,.55),
        rgba(168,85,247,.55),
        rgba(34,197,94,.35),
        rgba(59,130,246,.0)
      );
      filter: blur(18px);
      opacity:.55;
      animation: spin 8s linear infinite;
      pointer-events:none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card-inner{
      position:relative;
      padding: 26px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    }

    .top{
      display:flex;
      justify-content:space-between;
      margin-bottom:18px;
    }

    h1{
      margin:0;
      font-size:28px;
    }

    .sub{
      margin:0;
      color: var(--muted);
      font-size:14px;
    }

    .pill{
      padding:8px 12px;
      border-radius:999px;
      background: rgba(17,24,39,.45);
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--glow);
      font-size:12px;
    }

    form{ display:grid; gap:14px; }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    @media (max-width:720px){
      .grid{ grid-template-columns:1fr; }
    }

    .row{
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.10);
      border-radius:16px;
      padding:14px;
    }

    label{
      display:block;
      font-weight:600;
      margin-bottom:8px;
    }

    select, input{
      width:100%;
      padding:11px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.22);
      color: var(--text);
    }

    .hint{
      font-size:12px;
      color:rgba(229,231,235,.62);
      margin-top:8px;
    }

    .hidden{ display:none; }

    .actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:8px;
    }

    .back{
      text-decoration:none;
      color: rgba(229,231,235,.85);
      font-weight:600;
      font-size:13px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.16);
      transition:.12s;
    }

    .back:hover{
      transform:translateY(-1px);
      border-color: rgba(59,130,246,.35);
    }

    button{
      border:0;
      border-radius:14px;
      padding:12px 16px;
      font-weight:700;
      cursor:pointer;
      background: linear-gradient(90deg, rgba(59,130,246,1), rgba(168,85,247,1));
    }

    .footer{
      margin-top:18px;
      text-align:center;
      border-top:1px solid rgba(255,255,255,.10);
      padding-top:14px;
    }

    .robot{
      width:min(380px, 92%);
      max-height:260px;
      border-radius:16px;
      margin-top:10px;
    }

  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="card-inner">

        <div class="top">
          <div>
            <h1>Invoice Rollforward X</h1>
            <p class="sub">
              Upload a prior-year Final invoice and generate the current-year Initial invoice
              as <strong>.DOCX</strong> + <strong>.PDF</strong>.
            </p>
          </div>
          <div class="pill">⚡ DOC → DOCX → PDF</div>
        </div>

        <form action="/rollforward" method="POST" enctype="multipart/form-data">

          <div class="grid">
            <div class="row">
              <label for="invoice_type">Invoice Type</label>
              <select id="invoice_type" name="invoice_type">
                <option value="initial">Initial Invoice</option>
                <option value="final">Final Invoice</option>
              </select>
            </div>

            <div class="row">
              <label for="rollforward_date">Rollforward Date</label>
              <input id="rollforward_date" name="rollforward_date" type="date" required />
            </div>
          </div>

          <div class="grid">
            <div class="row">
              <label for="amount_mode">Invoice Amount</label>
              <select id="amount_mode" name="amount_mode">
                <option value="same">Same as PY</option>
                <option value="changed">Has changed</option>
              </select>
            </div>

            <div class="row">
              <label for="invoice_file">Upload Invoice File</label>
              <input id="invoice_file" name="invoice_file" type="file" required />
            </div>
          </div>

          <div class="row hidden" id="amount_row">
            <label for="new_amount">New Amount</label>
            <input id="new_amount" name="new_amount" type="text" placeholder="Example: 12500 or $12,500" />
          </div>

          <div class="actions">
            <a class="back" href="/">← Back</a>
            <button type="submit">Rollforward</button>
          </div>

        </form>

        <div class="footer">
          <img class="robot" src="{{ url_for('static', filename='robot.gif') }}" alt="Robot assistant" />
        </div>

      </div>
    </div>
  </div>

  <script>
    const amountMode = document.getElementById("amount_mode");
    const amountRow = document.getElementById("amount_row");
    const newAmount = document.getElementById("new_amount");

    function syncAmountUI() {
      const isChanged = amountMode.value === "changed";
      amountRow.classList.toggle("hidden", !isChanged);
      newAmount.required = isChanged;
      if (!isChanged) newAmount.value = "";
    }

    amountMode.addEventListener("change", syncAmountUI);
    syncAmountUI();
  </script>

</body>
</html>
